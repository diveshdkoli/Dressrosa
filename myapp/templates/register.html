<!DOCTYPE html>
<html lang="en">
{% load static %}

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" />
</head>

<body class="bg-dark">

    <!-- Logo top-left -->
    <div style="position: absolute; top: 20px; left: 30px; z-index: 10;">
        <a href="/"><img src="{% static 'img/logo.png' %}" alt="Logo" style="height: 70px" /></a>
    </div>

    <!-- Full viewport container -->
    <div class="container-fluid d-flex justify-content-center align-items-center vh-100">
        <div class="bg-white rounded p-5 shadow" style="max-width: 700px; width: 100%;">
            <h1 class="mb-4 text-center">Register Now</h1>

            <form method="post" action="{% url 'reg' %}">
                {% csrf_token %}

                <div class="mb-3">
                    <label for="username" class="form-label fw-semibold">Username</label>
                    <input type="text" class="form-control border border-3 shadow p-2 bg-body-tertiary rounded"
                        id="username" name="uname" placeholder="Enter username" required />
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label fw-semibold">Email address</label>
                    <input type="email" class="form-control border border-3 shadow p-2 bg-body-tertiary rounded"
                        id="email" name="email" placeholder="Enter your email" required />
                    <div class="form-text">We'll never share your email with anyone else.</div>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label fw-semibold">Password</label>
                    <input type="password" class="form-control border border-3 shadow p-2 bg-body-tertiary rounded"
                        id="password" name="password" placeholder="Enter password" required />
                </div>

                <div class="mb-4">
                    <label for="confirmpassword" class="form-label fw-semibold">Confirm Password</label>
                    <input type="password" class="form-control border border-3 shadow p-2 bg-body-tertiary rounded"
                        id="confirmpassword" name="confirmpassword" placeholder="Confirm your password" required />
                </div>

                <div class="mb-4 form-check">
                    <input type="checkbox" class="form-check-input border border-4" id="termsCheck" required />
                    <label class="form-check-label" for="termsCheck">I agree to the terms and conditions</label>
                </div>

                {% if msg %}
                <div class="alert {% if 'successfully' in msg %}alert-success{% else %}alert-danger{% endif %} py-2">
                    {{ msg }}
                </div>
                {% endif %}

                <button type="submit" class="btn btn-primary w-100 fw-semibold">Submit</button>
            </form>

            <p class="text-center mt-3 mb-0">
                Already have an account? <a href="/login_page/">Login</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.querySelector('form').addEventListener('submit', function (e) {
            const pass = document.getElementById('password').value;
            const confirmPass = document.getElementById('confirmpassword').value;
            if (pass !== confirmPass) {
                e.preventDefault();
                alert('Passwords do not match!');
            }
        });
    </script>
</body>
</html>
